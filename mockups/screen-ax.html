<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>U-Quest AX 가안</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
:root{--uplus:#e6007e;--uplus-br:#ff3aa1;--uplus-deep:#a0125f;--ink:#3a2230;--sub:#a98da0;--pink-bg:#fbeef5;--pink-soft:#ffe9f3;--gold:#f0a000;--good:#13b877;--line:#f3e2eb;--shadow:0 10px 26px rgba(190,20,110,.1);--ax:#7c3aed}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Pretendard',system-ui,sans-serif;background:#ece0e7;display:flex;justify-content:center;padding:24px;color:var(--ink)}
.phone{width:390px;min-height:800px;background:var(--pink-bg);border-radius:38px;overflow:hidden;position:relative;box-shadow:0 30px 70px rgba(60,10,40,.3);padding-bottom:92px}
.scroll{height:100%;overflow:auto;padding:0 18px}
.top{display:flex;align-items:center;justify-content:space-between;padding:18px 4px 6px}
.brand{display:flex;align-items:center;gap:9px}
.brand .logo{height:30px;padding:0 10px;border-radius:9px;background:var(--uplus);color:#fff;font-weight:800;font-size:17px;display:grid;place-items:center}
.brand b{font-size:17px;color:var(--uplus-deep)}
.points{display:flex;align-items:center;gap:5px;background:#fff;padding:8px 12px;border-radius:30px;box-shadow:var(--shadow);font-weight:1000;font-size:13.5px;color:var(--uplus-deep)}
.points i{color:var(--uplus);font-style:normal}
.scr-title{padding:8px 4px 12px}
.scr-title h1{font-size:22px;letter-spacing:-.6px}
.scr-title p{font-size:12.5px;color:var(--sub);font-weight:700;margin-top:6px}
/* 로봇 성장 hero (AX는 보라 포인트로 차별화) */
.axhero{position:relative;border-radius:24px;overflow:hidden;padding:16px;color:#fff;background:radial-gradient(60% 70% at 78% 30%,rgba(255,255,255,.35),transparent 60%),linear-gradient(160deg,#a06bff,#7c3aed 60%,#5b21b6);box-shadow:0 16px 32px rgba(91,33,182,.3);display:flex;align-items:center;gap:14px}
.axhero img{height:104px;width:auto;filter:drop-shadow(0 10px 12px rgba(40,10,80,.4));animation:bob 3s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.axhero .info{flex:1}
.axhero .lv{display:inline-block;background:rgba(255,255,255,.22);font-weight:1000;font-size:12px;padding:5px 11px;border-radius:14px}
.axhero h2{font-size:19px;margin:8px 0 3px}
.axhero .sm{font-size:12px;opacity:.9}
.axbar{height:9px;border-radius:9px;background:rgba(255,255,255,.28);overflow:hidden;margin-top:11px}
.axbar>i{display:block;height:100%;width:40%;border-radius:9px;background:#fff}
.axbar-l{display:flex;justify-content:space-between;font-size:11px;font-weight:800;opacity:.92;margin-top:6px}
.sec{margin:22px 4px 12px;display:flex;align-items:center;justify-content:space-between}
.sec h3{font-size:16px;font-weight:800;letter-spacing:-.3px}
.sec .tag{font-size:11px;font-weight:1000;color:var(--ax);background:#efe7ff;padding:5px 10px;border-radius:14px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.axcard{background:#fff;border:1px solid #efe7f7;border-radius:18px;padding:14px;box-shadow:var(--shadow)}
.axcard .ico{width:44px;height:44px;border-radius:13px;background:#f1ebff;display:grid;place-items:center;font-size:22px}
.axcard .ty{font-size:10px;font-weight:1000;color:var(--ax);margin-top:10px}
.axcard .nm{font-size:14px;font-weight:800;letter-spacing:-.2px;margin-top:2px}
.axcard .meta{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.axcard .meta .cnt{font-size:11px;color:var(--sub);font-weight:800}
.axcard .meta .go{border:0;background:var(--uplus);color:#fff;font-family:inherit;font-weight:1000;font-size:11.5px;padding:8px 12px;border-radius:11px;box-shadow:0 6px 12px rgba(230,0,126,.25)}
.axcard .rew{font-size:11px;font-weight:1000;color:var(--gold);margin-top:8px}
.nav{position:absolute;left:0;right:0;bottom:0;height:76px;background:#fff;border-top:1px solid var(--line);display:flex;justify-content:space-around;align-items:center;padding-bottom:9px}
.nav a{display:flex;flex-direction:column;align-items:center;gap:4px;color:#c9b9c2;font-size:11px;font-weight:700;text-decoration:none}
.nav a svg{width:23px;height:23px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.nav a.on{color:var(--uplus)}
</style></head>
<body><div class="phone"><div class="scroll">
  <div class="top"><div class="brand"><div class="logo">U+</div><b>U-Quest</b></div><div class="points"><i>◆</i> 5,400P</div></div>
  <div class="scr-title"><h1>AX · DX 인증</h1><p>현장에서 AI 도구를 쓰고 인증하면 로봇이 성장해요</p></div>

  <div class="axhero">
    <img src="../public/assets/uquest/generated/ax-robots/ax_robot_explorer.png" alt="AX Explorer">
    <div class="info">
      <span class="lv">AX 파트너</span>
      <h2>Explorer</h2>
      <div class="sm">다음 단계 User까지 2회 남음</div>
      <div class="axbar"><i></i></div>
      <div class="axbar-l"><span>인증 8 / 10</span><span>40%</span></div>
    </div>
  </div>

  <div class="sec"><h3>AX · DX 항목</h3><span class="tag">항목당 +500P</span></div>
  <div class="grid">
    <div class="axcard"><div class="ico">🤖</div><div class="ty">AX</div><div class="nm">AI 헬프데스크</div><div class="rew">+500P</div><div class="meta"><span class="cnt">3회 인증</span><button class="go">인증</button></div></div>
    <div class="axcard"><div class="ico">💬</div><div class="ty">AX</div><div class="nm">스마트CS</div><div class="rew">+500P</div><div class="meta"><span class="cnt">2회 인증</span><button class="go">인증</button></div></div>
    <div class="axcard"><div class="ico">📱</div><div class="ty">AX</div><div class="nm">U+ONE</div><div class="rew">+500P</div><div class="meta"><span class="cnt">1회 인증</span><button class="go">인증</button></div></div>
    <div class="axcard"><div class="ico">🧮</div><div class="ty">AX</div><div class="nm">요금 시뮬레이터</div><div class="rew">+500P</div><div class="meta"><span class="cnt">2회 인증</span><button class="go">인증</button></div></div>
    <div class="axcard"><div class="ico">🔄</div><div class="ty">DX</div><div class="nm">생애주기</div><div class="rew">+500P</div><div class="meta"><span class="cnt">0회</span><button class="go">인증</button></div></div>
    <div class="axcard"><div class="ico">🎯</div><div class="ty">DX</div><div class="nm">타사확보</div><div class="rew">+500P</div><div class="meta"><span class="cnt">0회</span><button class="go">인증</button></div></div>
  </div>
  <div style="height:8px"></div>
</div>
<nav class="nav">
  <a href="#"><svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>홈</a>
  <a href="#"><svg viewBox="0 0 24 24"><path d="M4 5h16v14H4z"/><path d="M8 9h8M8 13h5"/></svg>학습</a>
  <a class="on" href="#"><svg viewBox="0 0 24 24"><rect x="4" y="7" width="16" height="12" rx="3"/><path d="M9 7V5h6v2M9 13h.01M15 13h.01"/></svg>AX</a>
  <a href="#"><svg viewBox="0 0 24 24"><path d="M5 8h14l-1 11H6z"/><path d="M9 8a3 3 0 0 1 6 0"/></svg>상점</a>
  <a href="#"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-6 8-6s8 2 8 6"/></svg>MY</a>
</nav></div></body></html>
