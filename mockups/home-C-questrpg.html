<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>U-Quest 홈 — 가안 C (Quest RPG)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root{
    --bg:#0c1030; --bg2:#141a45; --card:#1a2150; --line:#2a336b;
    --ink:#eef1ff; --sub:#9aa3d6; --violet:#8b5cf6; --cyan:#22d3ee; --lime:#a3e635; --gold:#fbbf24; --pink:#f472b6;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:'Pretendard',system-ui,sans-serif;background:#05071a;display:flex;justify-content:center;padding:24px;color:var(--ink)}
  .phone{width:390px;min-height:780px;background:radial-gradient(120% 70% at 50% 0%,#1b1f54 0%,var(--bg) 55%);border-radius:38px;overflow:hidden;position:relative;box-shadow:0 30px 80px rgba(0,0,0,.6);padding-bottom:92px}
  .scroll{height:100%;overflow:auto;padding:0 18px}

  .top{display:flex;align-items:center;justify-content:space-between;padding:20px 4px 10px}
  .brand{display:flex;align-items:center;gap:9px}
  .brand .logo{width:34px;height:34px;border-radius:11px;background:linear-gradient(135deg,var(--violet),var(--cyan));display:grid;place-items:center;font-weight:800;color:#06081e;box-shadow:0 0 18px rgba(139,92,246,.6)}
  .brand b{font-size:18px;letter-spacing:-.3px}
  .gem{display:flex;align-items:center;gap:7px;background:rgba(34,211,238,.12);border:1px solid rgba(34,211,238,.35);padding:8px 13px;border-radius:30px;font-weight:800;font-size:14px;color:#bef3fb}
  .gem i{color:var(--cyan);font-style:normal;text-shadow:0 0 10px rgba(34,211,238,.8)}

  .hello{padding:8px 4px 16px}
  .hello h1{font-size:22px;letter-spacing:-.4px}
  .hello h1 em{font-style:normal;background:linear-gradient(90deg,var(--cyan),var(--violet));-webkit-background-clip:text;background-clip:text;color:transparent}
  .hello p{color:var(--sub);font-size:13px;margin-top:5px;font-weight:500}

  /* hero character */
  .hero{position:relative;border-radius:26px;padding:22px 20px;overflow:hidden;border:1px solid var(--line);
        background:radial-gradient(90% 120% at 80% 0%,rgba(139,92,246,.35),transparent 60%),radial-gradient(80% 120% at 0% 100%,rgba(34,211,238,.22),transparent 55%),var(--card)}
  .stars{position:absolute;inset:0;background-image:radial-gradient(1.5px 1.5px at 20% 30%,#fff,transparent),radial-gradient(1.5px 1.5px at 70% 20%,#cdd6ff,transparent),radial-gradient(1px 1px at 40% 70%,#fff,transparent),radial-gradient(1.5px 1.5px at 85% 60%,#bff,transparent);opacity:.6}
  .hero .row{display:flex;align-items:center;gap:16px;position:relative;z-index:1}
  .avatar{width:118px;height:118px;border-radius:24px;flex:none;display:grid;place-items:center;font-size:64px;
          background:linear-gradient(160deg,#2a2f66,#171c46);border:1px solid rgba(139,92,246,.5);box-shadow:0 0 36px rgba(139,92,246,.45),inset 0 0 24px rgba(34,211,238,.15)}
  .hero .meta{flex:1}
  .tier{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:800;color:#0a0c24;background:linear-gradient(135deg,#e5e9f5,#aeb8d6);padding:5px 11px;border-radius:14px}
  .hero h2{font-size:18px;margin:9px 0 2px}
  .hero .sm{font-size:11.5px;color:var(--sub)}
  .xp{margin-top:13px}
  .xp .lab{display:flex;justify-content:space-between;font-size:11px;color:var(--sub);margin-bottom:6px;font-weight:600}
  .xpbar{height:10px;border-radius:10px;background:#0e1238;border:1px solid var(--line);overflow:hidden}
  .xpbar > i{display:block;height:100%;width:14%;border-radius:10px;background:linear-gradient(90deg,var(--cyan),var(--violet));box-shadow:0 0 14px rgba(34,211,238,.7)}

  .stat2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:13px}
  .st{border:1px solid var(--line);background:rgba(255,255,255,.03);border-radius:18px;padding:14px 15px;display:flex;align-items:center;gap:11px}
  .st .ic{width:42px;height:42px;border-radius:13px;display:grid;place-items:center;font-size:22px;flex:none}
  .st.s1 .ic{background:rgba(244,114,182,.16);box-shadow:0 0 16px rgba(244,114,182,.3) inset}
  .st.s2 .ic{background:rgba(34,211,238,.14);box-shadow:0 0 16px rgba(34,211,238,.3) inset}
  .st .lab{font-size:11px;color:var(--sub);font-weight:600}
  .st .val{font-size:15px;font-weight:800}
  .st .val small{color:var(--sub);font-size:11px;font-weight:600}

  .sec-h{display:flex;align-items:center;justify-content:space-between;margin:24px 4px 13px}
  .sec-h h3{font-size:16px;letter-spacing:-.2px}
  .sec-h h3 span{color:var(--cyan)}
  .sec-h .cnt{font-size:12px;color:var(--sub);font-weight:700}

  .quest{display:flex;align-items:center;gap:13px;border:1px solid var(--line);border-radius:18px;padding:14px;margin-bottom:11px;background:linear-gradient(100deg,rgba(255,255,255,.04),rgba(255,255,255,.01))}
  .quest .ic{width:46px;height:46px;border-radius:14px;display:grid;place-items:center;font-size:23px;flex:none;background:#10153c;border:1px solid var(--line)}
  .quest .b{flex:1;min-width:0}
  .quest .b .t{font-weight:700;font-size:14.5px}
  .quest .b .r{font-size:12px;font-weight:800;margin-top:3px;color:var(--gold)}
  .quest .b .r.done{color:var(--lime)}
  .qbtn{flex:none;border:none;font-family:inherit;font-weight:800;font-size:13px;padding:11px 15px;border-radius:13px;cursor:pointer;color:#06081e;background:linear-gradient(135deg,var(--cyan),var(--violet));box-shadow:0 0 18px rgba(34,211,238,.35)}
  .qbtn.ghost{background:transparent;color:var(--sub);border:1px solid var(--line);box-shadow:none}
  .qdone{flex:none;color:var(--lime);font-weight:800;font-size:13px;padding-right:6px}
  .quest.done{opacity:.7}

  .nav{position:absolute;left:0;right:0;bottom:0;height:76px;background:rgba(10,13,40,.92);backdrop-filter:blur(10px);border-top:1px solid var(--line);display:flex;justify-content:space-around;align-items:center;padding-bottom:9px}
  .nav a{display:flex;flex-direction:column;align-items:center;gap:4px;color:#6b73a8;font-size:11px;font-weight:600;text-decoration:none;position:relative}
  .nav a svg{width:23px;height:23px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .nav a.on{color:var(--cyan)}
  .nav a.on svg{filter:drop-shadow(0 0 6px rgba(34,211,238,.8))}
</style>
</head>
<body>
<div class="phone">
  <div class="scroll">
    <div class="top">
      <div class="brand"><div class="logo">U</div><b>U·Quest</b></div>
      <div class="gem"><i>◆</i> 5,400</div>
    </div>

    <div class="hello">
      <h1><em>김은성</em> 신입사원님</h1>
      <p>강남점 · 온보딩 Day 1 / 20 진행 중</p>
    </div>

    <div class="hero">
      <div class="stars"></div>
      <div class="row">
        <div class="avatar">🧑‍💼</div>
        <div class="meta">
          <span class="tier">🛡️ Silver</span>
          <h2>새내기 · Lv.1</h2>
          <div class="sm">적응중 — 경험치를 모아 진화해요</div>
          <div class="xp">
            <div class="lab"><span>캐릭터 EXP</span><span>14%</span></div>
            <div class="xpbar"><i></i></div>
          </div>
        </div>
      </div>
      <div class="stat2">
        <div class="st s1"><div class="ic">🎯</div><div><div class="lab">퀴즈 정답률</div><div class="val">50% <small>Silver</small></div></div></div>
        <div class="st s2"><div class="ic">🤖</div><div><div class="lab">AX 단계</div><div class="val">Explorer <small>40%</small></div></div></div>
      </div>
    </div>

    <div class="sec-h">
      <h3>오늘의 <span>퀘스트</span></h3>
      <span class="cnt">1 / 4 클리어</span>
    </div>

    <div class="quest done">
      <div class="ic">📅</div>
      <div class="b"><div class="t">출석 체크</div><div class="r done">✓ +300P 획득</div></div>
      <div class="qdone">CLEAR</div>
    </div>
    <div class="quest">
      <div class="ic">📘</div>
      <div class="b"><div class="t">상담 품질 점검 학습</div><div class="r">+300P</div></div>
      <button class="qbtn">시작</button>
    </div>
    <div class="quest">
      <div class="ic">✏️</div>
      <div class="b"><div class="t">오늘의 퀴즈</div><div class="r">+300P / 문항</div></div>
      <button class="qbtn ghost">학습 후</button>
    </div>
    <div class="quest">
      <div class="ic">📸</div>
      <div class="b"><div class="t">AX 인증 도전</div><div class="r">+500P</div></div>
      <button class="qbtn">도전</button>
    </div>
    <div style="height:8px"></div>
  </div>

  <nav class="nav">
    <a class="on" href="#"><svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>홈</a>
    <a href="#"><svg viewBox="0 0 24 24"><path d="M4 5h16v14H4z"/><path d="M8 9h8M8 13h5"/></svg>학습</a>
    <a href="#"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M9.5 9a2.5 2.5 0 1 1 3 2.5V13"/><path d="M12 16.5h.01"/></svg>퀴즈</a>
    <a href="#"><svg viewBox="0 0 24 24"><rect x="4" y="7" width="16" height="12" rx="3"/><path d="M9 7V5h6v2M9 13h.01M15 13h.01"/></svg>AX</a>
    <a href="#"><svg viewBox="0 0 24 24"><path d="M5 8h14l-1 11H6z"/><path d="M9 8a3 3 0 0 1 6 0"/></svg>상점</a>
    <a href="#"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-6 8-6s8 2 8 6"/></svg>내정보</a>
  </nav>
</div>
</body>
</html>
